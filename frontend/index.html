<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ACIsstant | Local AI Assistant</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">

    <!-- TikzJax for Circuit Diagrams -->
    <link rel="stylesheet" type="text/css" href="https://tikzjax.com/v1/fonts.css">
    <script src="https://tikzjax.com/v1/tikzjax.js"></script>

    <!-- Marked and internal styles -->
    <link rel="stylesheet" href="static/style.css">
</head>

<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2 id="app-title">ACIsstant <span class="badge">V1</span></h2>
                <button class="new-chat-btn" id="btn-new-chat" onclick="createNewChat()">
                    <i class="fas fa-plus"></i> New Chat
                </button>
                <button class="new-chat-btn" id="btn-upload" onclick="document.getElementById('file-upload').click()"
                    style="margin-top: 10px; background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.3); color: #c084fc;">
                    <i class="fas fa-file-upload"></i> Upload & Index RAG
                </button>
                <input type="file" id="file-upload" multiple accept=".pdf,.txt,.md" style="display: none;"
                    onchange="uploadFiles(this.files)">
            </div>
            <div class="chat-list" id="chat-list">
                <!-- Chats will be loaded here -->
            </div>
            <div class="sidebar-footer">
                <button class="files-btn" id="btn-files" onclick="toggleFilesModal()">
                    <i class="fas fa-folder-open"></i> Files
                </button>
                <div class="status-indicator">
                    <span class="dot"></span> <span id="model-status">Model Ready (Qwen 3B)</span>
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="chat-info">
                    <h3 id="current-chat-title">Welcome</h3>
                </div>
                <div class="chat-actions">
                    <button class="icon-btn" id="btn-settings" onclick="showSettings()" title="Hardware Settings">
                        <i class="fas fa-cog"></i>
                    </button>
                    <select id="lang-select" onchange="updateLanguage()">
                        <option value="en-US">EN-US</option>
                        <option value="pt-PT">PT-PT</option>
                    </select>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-screen" id="welcome-screen">
                    <i class="fas fa-microchip main-icon"></i>
                    <h1 id="welcome-title">Hello!</h1>
                    <p id="welcome-subtitle">How can I help you with your Electronics and Signals studies today?</p>
                    <div class="suggestions" id="welcome-suggestions">
                        <button onclick="quickAction('Explain a 2nd order low-pass filter')">Low-Pass Filters</button>
                        <button onclick="quickAction('Explain the operating principle of an Op-Amp')">Op-Amps</button>
                        <button onclick="quickAction('Generate a simple circuit in LaTeX (Circuitikz)')">LaTeX Circuit</button>
                    </div>
                </div>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Type your question here..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn" title="Send message"><i class="fas fa-paper-plane"></i></button>
                </div>
                <p class="footer-note" id="footer-note">Qwen2.5 3B | Local Offline Inference</p>
            </footer>
        </main>
    </div>
    
    <!-- Files Management Modal -->
    <div id="files-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h3><i class="fas fa-folder-open"></i> Uploaded Documents</h3>
                <button class="close-modal" onclick="toggleFilesModal()">&times;</button>
            </header>
            <div class="modal-body">
                <div class="file-filters">
                    <button class="filter-btn active" onclick="filterFiles('all', this)">All</button>
                    <button class="filter-btn" onclick="filterFiles('pdf', this)">PDF</button>
                    <button class="filter-btn" onclick="filterFiles('md', this)">MD</button>
                    <button class="filter-btn" onclick="filterFiles('txt', this)">TXT</button>
                </div>
                <div class="files-grid" id="files-grid">
                    <!-- Files will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/latex.min.js"></script>

    <!-- KaTeX Javascript -->
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>

    <script src="static/app.js"></script>
</body>

</html>
