<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Local AI Assistant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Highlight.js for code blocks -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/styles/github-dark.min.css">
    <!-- KaTeX CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    
    <!-- Marked and internal styles -->
    <link rel="stylesheet" href="static/style.css">
</head>
<body class="dark-mode">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h2>Antigravity <span class="badge">V1</span></h2>
                <button class="new-chat-btn" onclick="createNewChat()">
                    <i class="fas fa-plus"></i> Novo Chat
                </button>
                <button class="new-chat-btn" onclick="document.getElementById('file-upload').click()" style="margin-top: 10px; background: rgba(168, 85, 247, 0.1); border-color: rgba(168, 85, 247, 0.3); color: #c084fc;">
                    <i class="fas fa-file-upload"></i> Upload & Indexar RAG
                </button>
                <input type="file" id="file-upload" multiple accept=".pdf,.txt,.md" style="display: none;" onchange="uploadFiles(this.files)">
            </div>
            <div class="chat-list" id="chat-list">
                <!-- Chats will be loaded here -->
            </div>
            <div class="sidebar-footer">
                <div class="status-indicator">
                    <span class="dot"></span> Model Ready (Qwen 4B)
                </div>
            </div>
        </aside>

        <!-- Main Chat Area -->
        <main class="chat-area">
            <header class="chat-header">
                <button id="toggle-sidebar" class="icon-btn"><i class="fas fa-bars"></i></button>
                <div class="chat-info">
                    <h3 id="current-chat-title">Bem-vindo</h3>
                </div>
                <div class="chat-actions">
                    <select id="lang-select" onchange="updateLanguage()">
                        <option value="pt-PT">PT-PT</option>
                        <option value="en-US">EN-US</option>
                    </select>
                </div>
            </header>

            <div class="chat-messages" id="chat-messages">
                <div class="welcome-screen">
                    <i class="fas fa-microchip main-icon"></i>
                    <h1>Olá, Henri!</h1>
                    <p>Como posso ajudar-te no teu estudo de Eletrónica e Sinais hoje?</p>
                    <div class="suggestions">
                        <button onclick="quickAction('Explica um filtro passa-baixo de 2ª ordem')">Filtros Passo-Baixo</button>
                        <button onclick="quickAction('Explica o princípio de funcionamento de um Op-Amp')">Op-Amps</button>
                        <button onclick="quickAction('Gera um circuito simples em LaTeX (Circuitikz)')">Circuito em LaTeX</button>
                    </div>
                </div>
            </div>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="user-input" placeholder="Escreve a tua dúvida aérea..." rows="1"></textarea>
                    <button id="send-btn" class="send-btn"><i class="fas fa-paper-plane"></i></button>
                </div>
                <p class="footer-note">Qwen2.5 4B | Local Offline Inference</p>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.0/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.8.0/languages/latex.min.js"></script>
    
    <!-- KaTeX Javascript -->
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    
    <script src="static/app.js"></script>
</body>
</html>
